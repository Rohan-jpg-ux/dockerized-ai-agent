version: '3.8'

services:
  ai-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: dockerized-ai-agent:latest
    container_name: ai-agent
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
